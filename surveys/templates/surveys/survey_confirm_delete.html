{% extends 'surveys/base.html' %}
{% block title %}Eliminar Encuesta{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6">
    <div class="card p-5 text-center">
      <i class="fas fa-exclamation-triangle fa-4x text-danger mb-3"></i>
      <h3 class="fw-bold">¿Eliminar encuesta?</h3>
      <p class="text-muted">Se eliminarán permanentemente <strong>{{ survey.title }}</strong> y todas sus respuestas.</p>
      <form method="post" class="d-flex gap-3 justify-content-center mt-3">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger px-4">Sí, eliminar</button>
        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary px-4">Cancelar</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
