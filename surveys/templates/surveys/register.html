{% extends 'surveys/base.html' %}
{% block title %}Registro{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card p-5">
      <div class="text-center mb-4">
        <i class="fas fa-user-plus fa-3x text-primary mb-2"></i>
        <h3 class="fw-bold">Crear Cuenta</h3>
      </div>
      <form method="post">
        {% csrf_token %}
        {% for field in form %}
          <div class="mb-3">
            <label class="form-label fw-semibold">{{ field.label }}</label>
            <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}"
                   class="form-control form-control-lg" {% if field.field.required %}required{% endif %}>
            {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors }}</div>{% endif %}
          </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary btn-lg w-100 mt-2">
          <i class="fas fa-rocket me-2"></i>Crear Cuenta
        </button>
      </form>
      <hr>
      <p class="text-center mb-0">¿Ya tienes cuenta? <a href="{% url 'login' %}">Inicia sesión</a></p>
    </div>
  </div>
</div>
{% endblock %}
